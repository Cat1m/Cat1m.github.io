<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc mừng 20 tháng 10</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #ffecd2);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }
        #loveLink {
            font-size: 24px;
            color: #e91e63;
            text-decoration: none;
            padding: 10px 20px;
            border: 2px solid #e91e63;
            border-radius: 50px;
            transition: all 0.3s ease;
        }
        #loveLink:hover {
            background-color: #e91e63;
            color: white;
        }
        #message, #wish {
            font-size: 36px;
            color: #d81b60;
            text-align: center;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s ease;
        }
        .show {
            opacity: 1 !important;
            transform: scale(1) !important;
        }
        #heart {
            font-size: 100px;
            color: #e91e63;
            animation: heartbeat 1.5s ease-in-out infinite both;
        }
        @keyframes heartbeat {
            0% {transform: scale(1);}
            14% {transform: scale(1.3);}
            28% {transform: scale(1);}
            42% {transform: scale(1.3);}
            70% {transform: scale(1);}
        }
    </style>
</head>
<body>
    <a href="#" id="loveLink">Nhấp vào đây</a>
    <div id="message"></div>
    <div id="heart" style="display: none;">❤️</div>
    <div id="wish"></div>

    <script>
        document.getElementById('loveLink').addEventListener('click', function(e) {
            e.preventDefault();
            this.style.display = 'none';
            
            setTimeout(() => {
                document.getElementById('message').textContent = "I LOVE U";
                document.getElementById('message').classList.add('show');
            }, 500);

            setTimeout(() => {
                document.getElementById('heart').style.display = 'block';
            }, 1500);

            setTimeout(() => {
                document.getElementById('wish').textContent = "Chúc mừng ngày 20/10!";
                document.getElementById('wish').classList.add('show');
            }, 2500);
        });
    </script>
</body>
</html>
