<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tỏ tình</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        #message {
            font-size: 24px;
            color: red;
            display: none;
        }
    </style>
</head>
<body>
    <a href="#" id="loveLink">Nhấp vào đây</a>
    <div id="message">I LOVE U</div>

    <script>
        document.getElementById('loveLink').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('message').style.display = 'block';
            this.style.display = 'none';
        });
    </script>
</body>
</html>
